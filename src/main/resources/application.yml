server:
  port: 8080
  error:
    include-message: never

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  public-base-url: ${APP_PUBLIC_BASE_URL:http://10.0.2.2:8080}
  incident-photos-folder: ${APP_INCIDENT_PHOTOS_FOLDER:incident-photos}
  cors-allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5174,http://127.0.0.1:5174,http://localhost:5173,http://127.0.0.1:5173,https://padelstack-pwa.onrender.com,https://padelstack-paneladmin.onrender.com}

firebase:
  service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:}
  service-account-base64: ${FIREBASE_SERVICE_ACCOUNT_BASE64:}
  config-path: ${FIREBASE_CONFIG_PATH:}
  project-id: ${FIREBASE_PROJECT_ID:}
  storage-bucket: ${FIREBASE_STORAGE_BUCKET:}

logging:
  level:
    root: INFO
    com.padelstack.api: INFO
