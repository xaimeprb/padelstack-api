server:
  port: 8080
  error:
    include-message: never

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  public-base-url: ${APP_PUBLIC_BASE_URL:http://10.0.2.2:8080}
  incident-photos-folder: ${APP_INCIDENT_PHOTOS_FOLDER:incident-photos}

firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:}
  project-id: ${FIREBASE_PROJECT_ID:}
  storage-bucket: ${FIREBASE_STORAGE_BUCKET:}

logging:
  level:
    root: INFO
    com.padelstack.api: INFO
